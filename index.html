        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = line.split(',');
                let obj = {};
                headers.forEach((header, i) => obj[header] = values[i]);
                return obj;
            });
        }

        // Initialize App
        window.onload = () => {
            pharmaData = parseCSV(csvContent);
            initFilter();
            renderEncyclopedia();
            switchView('home');
        };

        function initFilter() {
            const select = document.getElementById('category-filter');
            const categories = [...new Set(pharmaData.map(item => item.分野))];
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        function switchView(viewId) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            // Show target section
            document.getElementById(viewId).classList.remove('hidden');
            
            // Toggle Header Home Button
            const backBtn = document.getElementById('back-home-btn');
            if (viewId === 'home') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }

            // Init logic for specific sections
            if(viewId === 'quiz-side-effect') initQuizSE();
            if(viewId === 'quiz-case') initQuizCase();
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        // --- Encyclopedia Logic ---
        function renderEncyclopedia() {
            const filter = document.getElementById('category-filter').value;
            const container = document.getElementById('encyclopedia-content');
            container.innerHTML = '';

            const filtered = filter === 'all' ? pharmaData : pharmaData.filter(d => d.分野 === filter);

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${item.分野}</span>
                        <span class="text-xs text-slate-400 font-mono">${item.薬効名}</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-3">${item.薬剤名}</h3>
                    <div class="space-y-3 text-sm leading-relaxed">
                        <div class="flex gap-2"><span class="flex-shrink-0 font-bold text-slate-400 w-12">薬理</span><p class="text-slate-700">${item.作用}</p></div>
                        <div class="flex gap-2"><span class="flex-shrink-0 font-bold text-red-400 w-12">副作用</span><p class="text-slate-700 font-medium">${item.副作用}</p></div>
                        <div class="flex gap-2"><span class="flex-shrink-0 font-bold text-amber-500 w-12">観察</span><p class="text-slate-700">${item.観察事項}</p></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- Quiz Side Effect Logic ---
        let currentQuizSE = null;
        function initQuizSE() {
            currentQuizSE = pharmaData[Math.floor(Math.random() * pharmaData.length)];
            document.getElementById('quiz-se-category').textContent = currentQuizSE.分野;
            document.getElementById('quiz-se-drug').textContent = currentQuizSE.薬剤名;
            document.getElementById('quiz-se-class').textContent = currentQuizSE.薬効名;
            document.getElementById('quiz-se-feedback').textContent = '';

            let options = [currentQuizSE.副作用];
            while(options.length < 4) {
                const randomSE = pharmaData[Math.floor(Math.random() * pharmaData.length)].副作用;
                if(!options.includes(randomSE)) options.push(randomSE);
            }
            options.sort(() => Math.random() - 0.5);

            const optContainer = document.getElementById('quiz-se-options');
            optContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 px-6 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition-all font-medium text-slate-700 text-left";
                btn.textContent = opt;
                btn.onclick = () => checkAnswerSE(opt, btn);
                optContainer.appendChild(btn);
            });
        }

        function checkAnswerSE(choice, btn) {
            const feedback = document.getElementById('quiz-se-feedback');
            if(choice === currentQuizSE.副作用) {
                feedback.textContent = "⭕ 正解！";
                feedback.className = "mt-6 font-bold text-lg text-green-600";
                btn.className = "w-full py-4 px-6 rounded-xl border-2 border-green-500 bg-green-50 font-bold text-green-700 text-left";
            } else {
                feedback.textContent = `❌ 不正解（正解: ${currentQuizSE.副作用}）`;
                feedback.className = "mt-6 font-bold text-lg text-red-600";
                btn.className = "w-full py-4 px-6 rounded-xl border-2 border-red-500 bg-red-50 font-bold text-red-700 text-left";
            }
            document.querySelectorAll('#quiz-se-options button').forEach(b => b.disabled = true);
        }

        // --- Quiz Case Logic ---
        let currentCase = null;
        function initQuizCase() {
            currentCase = pharmaData[Math.floor(Math.random() * pharmaData.length)];
            document.getElementById('quiz-case-text').textContent = currentCase.症例;
            document.getElementById('quiz-case-drug').textContent = `薬剤名: ${currentCase.薬剤名}`;
            document.getElementById('quiz-case-feedback').textContent = '';
            document.getElementById('case-phase-2').classList.add('hidden');
            document.getElementById('case-next-btn').classList.add('hidden');
            
            setupCaseOptions('case-options-se', currentCase.副作用, '副作用', (choice, btn) => checkCasePhase1(choice, btn));
        }

        function setupCaseOptions(containerId, correctAnswer, dataKey, callback) {
            let options = [correctAnswer];
            while(options.length < 4) {
                const randomVal = pharmaData[Math.floor(Math.random() * pharmaData.length)][dataKey];
                if(!options.includes(randomVal)) options.push(randomVal);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById(containerId);
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 px-5 rounded-xl border-2 border-slate-200 text-left hover:border-indigo-400 hover:bg-indigo-50 transition-all font-medium";
                btn.textContent = opt;
                btn.onclick = () => callback(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkCasePhase1(choice, btn) {
            if(choice === currentCase.副作用) {
                btn.className = "w-full py-4 px-5 rounded-xl border-2 border-green-500 bg-green-50 font-bold text-green-700 text-left";
                document.querySelectorAll('#case-options-se button').forEach(b => b.disabled = true);
                document.getElementById('case-phase-2').classList.remove('hidden');
                setupCaseOptions('case-options-obs', currentCase.観察事項, '観察事項', (choice2, btn2) => checkCasePhase2(choice2, btn2));
            } else {
                btn.className = "w-full py-4 px-5 rounded-xl border-2 border-red-500 bg-red-50 font-bold text-red-700 text-left";
            }
        }

        function checkCasePhase2(choice, btn) {
            const feedback = document.getElementById('quiz-case-feedback');
            if(choice === currentCase.観察事項) {
                btn.className = "w-full py-4 px-5 rounded-xl border-2 border-green-500 bg-green-50 font-bold text-green-700 text-left";
                feedback.textContent = "⭕ 全問正解です！次のステップへ進みましょう。";
                feedback.className = "mt-6 font-bold text-lg text-green-600";
                document.querySelectorAll('#case-options-obs button').forEach(b => b.disabled = true);
                document.getElementById('case-next-btn').classList.remove('hidden');
            } else {
                btn.className = "w-full py-4 px-5 rounded-xl border-2 border-red-500 bg-red-50 font-bold text-red-700 text-left";
            }
        }

    </script>
</body>
</html>
