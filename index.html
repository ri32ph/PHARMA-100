<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看護薬理 100 - 図鑑 & トレーニング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .option-btn { transition: all 0.2s; }
        .step-indicator { height: 4px; border-radius: 2px; transition: all 0.3s; }
        .step-active { background-color: #0d9488; width: 40px; }
        .step-inactive { background-color: #e2e8f0; width: 20px; }
        /* 図鑑用カスタムスクロール */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight">💊 PHARMA-100</h1>
            <div class="flex space-x-2">
                <button onclick="showScreen('home')" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-1.5 rounded-full font-bold transition-colors">HOME</button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <!-- Home Screen -->
        <section id="home-screen" class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 text-center">
                <h2 class="text-xl font-bold text-slate-800">学習メニュー</h2>
                <p id="stats-text" class="text-slate-500 text-xs mt-1">読み込み中...</p>
            </div>

            <div class="grid gap-3">
                <!-- 図鑑コーナー -->
                <button onclick="showScreen('encyclopedia')" class="bg-amber-500 text-white p-5 rounded-2xl shadow-md flex items-center space-x-4 hover:opacity-90 transition-opacity">
                    <span class="text-3xl">📖</span>
                    <div class="text-left">
                        <span class="font-bold text-lg block">薬50 (図鑑)</span>
                        <span class="text-[10px] opacity-90 italic">分野別に作用・副作用をチェック</span>
                    </div>
                </button>

                <button onclick="startDirectTraining()" class="bg-rose-600 text-white p-5 rounded-2xl shadow-md flex items-center space-x-4 hover:opacity-90 transition-opacity">
                    <span class="text-3xl">⚡</span>
                    <div class="text-left">
                        <span class="font-bold text-lg block">薬×副作用</span>
                        <span class="text-[10px] opacity-80 italic">薬剤名・薬効から副作用を即答する特訓</span>
                    </div>
                </button>

                <button onclick="startTraining('all')" class="bg-teal-600 text-white p-5 rounded-2xl shadow-md flex items-center space-x-4 hover:opacity-90 transition-opacity">
                    <span class="text-3xl">🔥</span>
                    <div class="text-left">
                        <span class="font-bold text-lg block">症例×薬</span>
                        <span class="text-[10px] opacity-80 italic">臨床状況から副作用と観察事項を判断する総合問題</span>
                    </div>
                </button>

                <div class="pt-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">分野別 症例問題</p>
                    <div id="category-list" class="grid grid-cols-1 gap-2">
                        <!-- Categories will be rendered here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Encyclopedia Screen -->
        <section id="encyclopedia-screen" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-xl font-black text-slate-800 flex items-center">
                    <span class="mr-2">📖</span> 薬50 重要図鑑
                </h2>
                <span class="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded-full font-bold">分野別</span>
            </div>
            <div class="relative">
                <input type="text" id="search-encyclopedia" oninput="filterEncyclopedia()" placeholder="薬剤名・作用で検索..." class="w-full p-3 pl-10 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                <span class="absolute left-3 top-3.5 opacity-30 text-sm">🔍</span>
            </div>
            <div id="encyclopedia-list" class="space-y-6 max-h-[70vh] overflow-y-auto custom-scrollbar pr-1 pb-10">
                <!-- Categories and Cards will be rendered here -->
            </div>
        </section>

        <!-- Training Screen -->
        <section id="training-screen" class="hidden space-y-4">
            <div class="flex flex-col space-y-2">
                <div class="flex justify-between items-center text-[10px] font-bold text-slate-400">
                    <span id="progress-text">CASE 1/--</span>
                    <span id="category-badge" class="bg-slate-200 text-slate-600 px-2 py-0.5 rounded uppercase">CATEGORY</span>
                </div>
                <div id="step-bars" class="flex space-x-1">
                    <div id="step-1-bar" class="step-indicator step-inactive"></div>
                    <div id="step-2-bar" class="step-indicator step-inactive"></div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="space-y-4">
                    <div id="case-container" class="bg-slate-50 p-3 rounded-xl border-l-4 border-teal-500">
                        <p id="case-text" class="text-sm text-slate-700 font-bold leading-relaxed"></p>
                    </div>
                    <div>
                        <div id="q-header-label" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Drug Name / Class</div>
                        <div class="flex items-baseline space-x-2 flex-wrap">
                            <p id="drug-name" class="text-2xl text-slate-900 font-black"></p>
                            <span id="drug-class" class="text-[11px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded border border-teal-100"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="question-prompt" class="text-center font-bold text-teal-800 text-sm py-2"></div>
            <div id="options-container" class="grid gap-2.5"></div>
            <div id="feedback" class="hidden p-4 rounded-2xl text-center font-bold text-sm"></div>
            <button id="next-btn" onclick="processNext()" class="hidden w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">次へ進む</button>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="hidden text-center space-y-8 py-10">
            <div class="text-7xl">🎓</div>
            <h2 class="text-2xl font-bold text-slate-800">トレーニング完了</h2>
            <p id="result-stats" class="text-slate-500"></p>
            <button onclick="showScreen('home')" class="w-full bg-teal-600 text-white py-4 rounded-2xl font-bold shadow-lg">ホームへ戻る</button>
        </section>
    </main>

            ["神経・精神","てんかん。服用後、歯茎が腫れて盛り上がってきた。","フェニトイン","歯肉増殖","口腔内清潔"],

            ["呼吸器","喘息。吸入後、手が震え、動悸がするという。","サルブタモール","頻脈・手指振戦","心拍数・震戦"],

            ["呼吸器","COPD。吸入後、おしっこが出にくくなった。","チオトロピウム","尿閉(抗コリン作用)","排尿状況"],
            ["呼吸器","結核。信号の赤と緑が見分けにくいという。","エタンブトール","視神経炎","視力・色覚検査"],
            ["呼吸器","喘息。動悸がし、血中濃度が25μg/mLを超えた。","テオフィリン","テオフィリン中毒","血中濃度・不整脈"],
            ["消化器","鎮痛薬。みぞおちが痛み、真っ黒な便が出た。","ロキソプロフェン","消化性潰瘍","腹痛・便の色"],
            ["消化器","吐き気どめ。長期服用で、胸が大きくなり、乳汁のような液が出た。","ドンペリドン","高プロラクチン血症","乳房症状・月経異常"],
            ["消化器","便秘薬。服用後、激しい腹痛と水様便が続いている。","センノシド","下痢・腹痛","排便回数・腹痛"],
            ["消化器","クローン病。点滴中、寒気と発疹が出現した。","インフリキシマブ","インフュージョンリアクション","バイタル・皮膚症状"],
            ["感染症","抗菌薬。点滴開始10分で血圧が下がり、顔が腫れた。","セファゾリン","アナフィラキシー","血圧・呼吸状態"],
            ["感染症","MRSA治療。点滴中に全身が赤くなり、痒みを訴えた。","バンコマイシン","レッドマン症候群","点滴速度・皮膚発赤"],
            ["感染症","インフルエンザ。服用後に異常行動が見られた。","オセルタミビル","異常行動","安全確保"],
            ["がん化学療法","抗がん剤。白血球が1000以下になり、高熱が出た。","5-FU","骨髄抑制","発熱・感染兆候"],
            ["がん化学療法","抗がん剤。手足がしびれ、ボタンがかけにくい。","シスプラチン","末梢神経障害","しびれ・巧緻動作"],
            ["がん化学療法","抗がん剤。点滴の針先が漏れて、皮膚が黒ずんできた。","エピルビシン","血管外漏出(壊死)","刺入部の観察"],
            ["緩和ケア","がん疼痛。呼吸数が8回まで減り、うとうとしている。","モルヒネ","呼吸抑制","呼吸数・意識・瞳孔"],
            ["緩和ケア","がん疼痛。強い眠気と吐き気が続いている。","オキシコドン","悪心・嘔吐・眠気","吐き気どめの使用"],
            ["自己免疫","リウマチ。服用後に空咳が続き、息苦しい。","メトトレキサート","間質性肺炎","呼吸音・SpO2"]
        ];

        let questions = [];
        let currentCaseIdx = 0;
        let currentStep = 1;
        let sessionQuestions = [];
        let isDirectMode = false;

        window.onload = () => {
            // 今回は固定データを使用（CSV関連機能を削除したため）
            questions = RAW_DATA.map(d => ({ cat: d[0], case: d[1], drug: d[2], side: d[3], obs: d[4] }));
            renderHome();
            renderEncyclopedia();
        };

        function getDrugClass(name) {
            return drugClassMap[name] || "分類未定義";
        }

        function renderHome() {
            document.getElementById('stats-text').innerText = `収録問題数: ${questions.length}問`;
            const cats = [...new Set(questions.map(q => q.cat))];
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            
            cats.forEach(cat => {
                const count = questions.filter(q => q.cat === cat).length;
                const btn = document.createElement('button');
                btn.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center text-slate-700 font-bold text-sm hover:border-teal-500 transition-colors";
                btn.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="bg-slate-50 p-1.5 rounded">📂</span>
                        <span>${cat}</span>
                    </div>
                    <span class="text-[10px] text-slate-400 font-normal">${count}問</span>
                `;
                btn.onclick = () => startTraining(cat);
                container.appendChild(btn);
            });
        }

        function renderEncyclopedia() {
            const container = document.getElementById('encyclopedia-list');
            container.innerHTML = '';
            const categories = [...new Set(PHARMA_50.map(p => p.cat))];
            
            categories.forEach(cat => {
                const catDrugs = PHARMA_50.filter(p => p.cat === cat);
                const section = document.createElement('div');
                section.className = "encyclopedia-section space-y-3";
                
                const header = document.createElement('div');
                header.className = "flex items-center space-x-2 border-b-2 border-slate-200 pb-1 mb-2 mt-4";
                header.innerHTML = `
                    <span class="text-xl">${catDrugs[0].icon}</span>
                    <h3 class="font-black text-slate-800 uppercase tracking-wider text-sm">${cat}</h3>
                    <span class="text-[10px] text-slate-400 ml-auto">${catDrugs.length} 薬剤</span>
                `;
                section.appendChild(header);

                catDrugs.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "encyclopedia-card bg-white p-4 rounded-2xl border border-slate-200 shadow-sm space-y-2";
                    card.setAttribute('data-search', `${p.name} ${p.class} ${p.action} ${p.side} ${p.cat}`.toLowerCase());
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-lg font-black text-slate-900">${p.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold">${p.class}</p>
                            </div>
                        </div>
                        <div class="text-[11px] leading-relaxed">
                            <p class="text-slate-600"><strong class="text-slate-800">【作用】</strong> ${p.action}</p>
                            <p class="text-rose-600 mt-1"><strong class="text-slate-800">【副作用】</strong> ${p.side}</p>
                        </div>
                    `;
                    section.appendChild(card);
                });
                container.appendChild(section);
            });
        }

        function filterEncyclopedia() {
            const query = document.getElementById('search-encyclopedia').value.toLowerCase();
            const cards = document.querySelectorAll('.encyclopedia-card');
            const sections = document.querySelectorAll('.encyclopedia-section');

            cards.forEach(card => {
                const content = card.getAttribute('data-search');
                card.style.display = content.includes(query) ? 'block' : 'none';
            });

            sections.forEach(section => {
                const visibleCards = section.querySelectorAll('.encyclopedia-card[style="display: block;"]');
                section.style.display = visibleCards.length > 0 ? 'block' : 'none';
            });
        }

        function startDirectTraining() {
            isDirectMode = true;
            sessionQuestions = [...questions].sort(() => Math.random() - 0.5);
            currentCaseIdx = 0;
            currentStep = 1;
            showScreen('training');
            renderStep();
        }

        function startTraining(category) {
            isDirectMode = false;
            sessionQuestions = category === 'all' 
                ? [...questions].sort(() => Math.random() - 0.5)
                : questions.filter(q => q.cat === category).sort(() => Math.random() - 0.5);
            
            currentCaseIdx = 0;
            currentStep = 1;
            showScreen('training');
            renderStep();
        }

        function renderStep() {
            if (sessionQuestions.length === 0) return showScreen('home');
            
            const data = sessionQuestions[currentCaseIdx];
            document.getElementById('progress-text').innerText = `Q ${currentCaseIdx + 1} / ${sessionQuestions.length}`;
            document.getElementById('category-badge').innerText = isDirectMode ? "薬×副作用" : data.cat;
            
            document.getElementById('case-container').style.display = isDirectMode ? 'none' : 'block';
            document.getElementById('step-bars').style.display = isDirectMode ? 'none' : 'flex';

            const useClassAsMain = isDirectMode && Math.random() > 0.5;
            if (useClassAsMain) {
                document.getElementById('q-header-label').innerText = "Drug Class (薬効群名)";
                document.getElementById('drug-name').innerText = getDrugClass(data.drug);
                document.getElementById('drug-class').innerText = data.drug;
            } else {
                document.getElementById('q-header-label').innerText = "Drug Name / Class";
                document.getElementById('drug-name').innerText = data.drug;
                document.getElementById('drug-class').innerText = getDrugClass(data.drug);
            }
            
            if(!isDirectMode) {
                document.getElementById('case-text').innerText = data.case;
                document.getElementById('step-1-bar').className = `step-indicator ${currentStep === 1 ? 'step-active' : 'step-inactive'}`;
                document.getElementById('step-2-bar').className = `step-indicator ${currentStep === 2 ? 'step-active' : 'step-inactive'}`;
            }

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            const isStep1 = (currentStep === 1);
            const correct = isStep1 ? data.side : data.obs;
            const prompt = isStep1 ? "代表的な副作用を選んでください" : "看護師の重点観察項目は？";
            
            document.getElementById('question-prompt').innerText = prompt;

            const allOptions = questions.map(q => isStep1 ? q.side : q.obs).filter(v => v !== correct);
            const uniqueOptions = [...new Set(allOptions)];
            const fakes = shuffle(uniqueOptions).slice(0, 3);
            const opts = shuffle([correct, ...fakes]);

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full bg-white p-4 rounded-2xl border-2 border-slate-100 text-left font-bold text-slate-700 text-sm leading-tight hover:border-slate-300";
                btn.innerText = opt;
                btn.onclick = () => {
                    const btns = container.children;
                    for(let b of btns) b.disabled = true;
                    if(opt === correct) {
                        document.getElementById('feedback').innerText = "⭕ 正解";
                        document.getElementById('feedback').className = "p-4 rounded-2xl bg-green-50 text-green-700 font-bold border border-green-200";
                        btn.classList.add("border-green-500", "bg-green-50");
                    } else {
                        document.getElementById('feedback').innerText = `❌ 正解：${correct}`;
                        document.getElementById('feedback').className = "p-4 rounded-2xl bg-red-50 text-red-700 font-bold border border-red-200";
                        btn.classList.add("border-red-500", "bg-red-50");
                    }
                    document.getElementById('feedback').classList.remove('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        }

        function processNext() {
            if(!isDirectMode && currentStep === 1) {
                currentStep = 2;
                renderStep();
            } else {
                currentStep = 1;
                currentCaseIdx++;
                if(currentCaseIdx < sessionQuestions.length) renderStep();
                else showScreen('result');
            }
        }

        function showScreen(id) {
            ['home', 'training', 'result', 'encyclopedia'].forEach(s => {
                const el = document.getElementById(s+'-screen');
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id+'-screen').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    </script>
